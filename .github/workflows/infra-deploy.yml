            --parameters @"$PARAM_FILE"

      - name: Deploy
        id: deploy
        run: |
          DEPLOYMENT_NAME="infra-production-${{ github.run_id }}-${{ github.run_attempt }}"
          az deployment group create \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
