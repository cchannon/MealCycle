name: Infra Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/infra-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment to deploy
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
          - production

permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev')
    name: Deploy dev infrastructure
    runs-on: ubuntu-latest
    environment: ${{ vars.DEPLOY_ENV_DEV || 'dev' }}
    outputs:
      storageAccountName: ${{ steps.extract_outputs.outputs.storageAccountName }}
      storageTableEndpoint: ${{ steps.extract_outputs.outputs.storageTableEndpoint }}
      recipesTableName: ${{ steps.extract_outputs.outputs.recipesTableName }}
      mealPlanTableName: ${{ steps.extract_outputs.outputs.mealPlanTableName }}
      cookProgressTableName: ${{ steps.extract_outputs.outputs.cookProgressTableName }}
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME || '' }}
      AZURE_FUNCTIONAPP_NAME: ${{ vars.AZURE_FUNCTIONAPP_NAME || '' }}
      PARAM_FILE: infra/main.dev.parameters.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required variables
        run: |
          test -n "$AZURE_CLIENT_ID"
          test -n "$AZURE_TENANT_ID"
          test -n "$AZURE_SUBSCRIPTION_ID"
          test -n "$AZURE_RESOURCE_GROUP"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: What-if
        run: |
          az deployment group what-if \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters @"$PARAM_FILE"

      - name: Deploy
        id: deploy
        run: |
          DEPLOYMENT_NAME="infra-dev-${{ github.run_id }}-${{ github.run_attempt }}"
          az deployment group create \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters @"$PARAM_FILE" \
            --output json > deployment-result.json

      - name: Extract deployment outputs
        id: extract_outputs
        run: |
          echo "storageAccountName=$(jq -r '.properties.outputs.storageAccountName.value // empty' deployment-result.json)" >> "$GITHUB_OUTPUT"
          echo "storageTableEndpoint=$(jq -r '.properties.outputs.storageTableEndpoint.value // empty' deployment-result.json)" >> "$GITHUB_OUTPUT"
          echo "recipesTableName=$(jq -r '.properties.outputs.recipesTableOutput.value // empty' deployment-result.json)" >> "$GITHUB_OUTPUT"
          echo "mealPlanTableName=$(jq -r '.properties.outputs.mealPlanTableOutput.value // empty' deployment-result.json)" >> "$GITHUB_OUTPUT"
          echo "cookProgressTableName=$(jq -r '.properties.outputs.cookProgressTableOutput.value // empty' deployment-result.json)" >> "$GITHUB_OUTPUT"

      - name: Apply runtime settings to App Service (optional)
        if: env.AZURE_WEBAPP_NAME != ''
        run: |
          az webapp config appsettings set \
            --name "$AZURE_WEBAPP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --settings \
              AzureStorage__TableServiceUri="${{ steps.extract_outputs.outputs.storageTableEndpoint }}" \
              AzureStorage__RecipesTableName="${{ steps.extract_outputs.outputs.recipesTableName }}" \
              AzureStorage__MealPlanTableName="${{ steps.extract_outputs.outputs.mealPlanTableName }}" \
              AzureStorage__CookProgressTableName="${{ steps.extract_outputs.outputs.cookProgressTableName }}"

      - name: Apply runtime settings to Function App (optional)
        if: env.AZURE_FUNCTIONAPP_NAME != ''
        run: |
          az functionapp config appsettings set \
            --name "$AZURE_FUNCTIONAPP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --settings \
              AzureStorage__TableServiceUri="${{ steps.extract_outputs.outputs.storageTableEndpoint }}" \
              AzureStorage__RecipesTableName="${{ steps.extract_outputs.outputs.recipesTableName }}" \
              AzureStorage__MealPlanTableName="${{ steps.extract_outputs.outputs.mealPlanTableName }}" \
              AzureStorage__CookProgressTableName="${{ steps.extract_outputs.outputs.cookProgressTableName }}"

      - name: Runtime settings target not configured
        if: env.AZURE_WEBAPP_NAME == '' && env.AZURE_FUNCTIONAPP_NAME == ''
        run: |
          echo "No AZURE_WEBAPP_NAME or AZURE_FUNCTIONAPP_NAME variable configured. Skipping runtime app settings update."

      - name: Upload deployment result artifact
        uses: actions/upload-artifact@v4
        with:
          name: infra-dev-deployment-result
          path: deployment-result.json

      - name: Deployment summary
        run: |
          {
            echo "### Dev Infra Deployment Outputs"
            echo "- storageAccountName: ${{ steps.extract_outputs.outputs.storageAccountName }}"
            echo "- storageTableEndpoint: ${{ steps.extract_outputs.outputs.storageTableEndpoint }}"
            echo "- recipesTableName: ${{ steps.extract_outputs.outputs.recipesTableName }}"
            echo "- mealPlanTableName: ${{ steps.extract_outputs.outputs.mealPlanTableName }}"
            echo "- cookProgressTableName: ${{ steps.extract_outputs.outputs.cookProgressTableName }}"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-staging:
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'staging'
    name: Deploy staging infrastructure
    runs-on: ubuntu-latest
    environment: ${{ vars.DEPLOY_ENV_STAGING || 'staging' }}
    outputs:
      storageAccountName: ${{ steps.extract_outputs.outputs.storageAccountName }}
      storageTableEndpoint: ${{ steps.extract_outputs.outputs.storageTableEndpoint }}
      recipesTableName: ${{ steps.extract_outputs.outputs.recipesTableName }}
      mealPlanTableName: ${{ steps.extract_outputs.outputs.mealPlanTableName }}
      cookProgressTableName: ${{ steps.extract_outputs.outputs.cookProgressTableName }}
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME || '' }}
      AZURE_FUNCTIONAPP_NAME: ${{ vars.AZURE_FUNCTIONAPP_NAME || '' }}
      PARAM_FILE: infra/main.staging.parameters.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required variables
        run: |
          test -n "$AZURE_CLIENT_ID"
          test -n "$AZURE_TENANT_ID"
          test -n "$AZURE_SUBSCRIPTION_ID"
          test -n "$AZURE_RESOURCE_GROUP"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: What-if
        run: |
          az deployment group what-if \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters @"$PARAM_FILE"

      - name: Deploy
        id: deploy
        run: |
          DEPLOYMENT_NAME="infra-staging-${{ github.run_id }}-${{ github.run_attempt }}"
          az deployment group create \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters @"$PARAM_FILE" \
            --output json > deployment-result.json

      - name: Extract deployment outputs
        id: extract_outputs
        run: |
          echo "storageAccountName=$(jq -r '.properties.outputs.storageAccountName.value // empty' deployment-result.json)" >> "$GITHUB_OUTPUT"
          echo "storageTableEndpoint=$(jq -r '.properties.outputs.storageTableEndpoint.value // empty' deployment-result.json)" >> "$GITHUB_OUTPUT"
          echo "recipesTableName=$(jq -r '.properties.outputs.recipesTableOutput.value // empty' deployment-result.json)" >> "$GITHUB_OUTPUT"
          echo "mealPlanTableName=$(jq -r '.properties.outputs.mealPlanTableOutput.value // empty' deployment-result.json)" >> "$GITHUB_OUTPUT"
          echo "cookProgressTableName=$(jq -r '.properties.outputs.cookProgressTableOutput.value // empty' deployment-result.json)" >> "$GITHUB_OUTPUT"

      - name: Apply runtime settings to App Service (optional)
        if: env.AZURE_WEBAPP_NAME != ''
        run: |
          az webapp config appsettings set \
            --name "$AZURE_WEBAPP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --settings \
              AzureStorage__TableServiceUri="${{ steps.extract_outputs.outputs.storageTableEndpoint }}" \
              AzureStorage__RecipesTableName="${{ steps.extract_outputs.outputs.recipesTableName }}" \
              AzureStorage__MealPlanTableName="${{ steps.extract_outputs.outputs.mealPlanTableName }}" \
              AzureStorage__CookProgressTableName="${{ steps.extract_outputs.outputs.cookProgressTableName }}"

      - name: Apply runtime settings to Function App (optional)
        if: env.AZURE_FUNCTIONAPP_NAME != ''
        run: |
          az functionapp config appsettings set \
            --name "$AZURE_FUNCTIONAPP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --settings \
              AzureStorage__TableServiceUri="${{ steps.extract_outputs.outputs.storageTableEndpoint }}" \
              AzureStorage__RecipesTableName="${{ steps.extract_outputs.outputs.recipesTableName }}" \
              AzureStorage__MealPlanTableName="${{ steps.extract_outputs.outputs.mealPlanTableName }}" \
              AzureStorage__CookProgressTableName="${{ steps.extract_outputs.outputs.cookProgressTableName }}"

      - name: Runtime settings target not configured
        if: env.AZURE_WEBAPP_NAME == '' && env.AZURE_FUNCTIONAPP_NAME == ''
        run: |
          echo "No AZURE_WEBAPP_NAME or AZURE_FUNCTIONAPP_NAME variable configured. Skipping runtime app settings update."

      - name: Upload deployment result artifact
        uses: actions/upload-artifact@v4
        with:
          name: infra-staging-deployment-result
          path: deployment-result.json

      - name: Deployment summary
        run: |
          {
            echo "### Staging Infra Deployment Outputs"
            echo "- storageAccountName: ${{ steps.extract_outputs.outputs.storageAccountName }}"
            echo "- storageTableEndpoint: ${{ steps.extract_outputs.outputs.storageTableEndpoint }}"
            echo "- recipesTableName: ${{ steps.extract_outputs.outputs.recipesTableName }}"
            echo "- mealPlanTableName: ${{ steps.extract_outputs.outputs.mealPlanTableName }}"
            echo "- cookProgressTableName: ${{ steps.extract_outputs.outputs.cookProgressTableName }}"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-production:
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
    name: Deploy production infrastructure
    runs-on: ubuntu-latest
    environment: ${{ vars.DEPLOY_ENV_PRODUCTION || 'production' }}
    outputs:
      storageAccountName: ${{ steps.extract_outputs.outputs.storageAccountName }}
      storageTableEndpoint: ${{ steps.extract_outputs.outputs.storageTableEndpoint }}
      recipesTableName: ${{ steps.extract_outputs.outputs.recipesTableName }}
      mealPlanTableName: ${{ steps.extract_outputs.outputs.mealPlanTableName }}
      cookProgressTableName: ${{ steps.extract_outputs.outputs.cookProgressTableName }}
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME || '' }}
      AZURE_FUNCTIONAPP_NAME: ${{ vars.AZURE_FUNCTIONAPP_NAME || '' }}
      PARAM_FILE: infra/main.production.parameters.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required variables
        run: |
          test -n "$AZURE_CLIENT_ID"
          test -n "$AZURE_TENANT_ID"
          test -n "$AZURE_SUBSCRIPTION_ID"
          test -n "$AZURE_RESOURCE_GROUP"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: What-if
        run: |
          az deployment group what-if \
            --resource-group "$AZURE_RESOURCE_GROUP" \
