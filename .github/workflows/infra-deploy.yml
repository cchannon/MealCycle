      - name: Extract deployment outputs
        id: extract_outputs
        run: |
          echo "storageAccountName=$(jq -r '.properties.outputs.storageAccountName.value // empty' deployment-result.json)" >> "$GITHUB_OUTPUT"
          echo "storageTableEndpoint=$(jq -r '.properties.outputs.storageTableEndpoint.value // empty' deployment-result.json)" >> "$GITHUB_OUTPUT"
          echo "recipesTableName=$(jq -r '.properties.outputs.recipesTableOutput.value // empty' deployment-result.json)" >> "$GITHUB_OUTPUT"
          echo "mealPlanTableName=$(jq -r '.properties.outputs.mealPlanTableOutput.value // empty' deployment-result.json)" >> "$GITHUB_OUTPUT"
          echo "cookProgressTableName=$(jq -r '.properties.outputs.cookProgressTableOutput.value // empty' deployment-result.json)" >> "$GITHUB_OUTPUT"

      - name: Apply runtime settings to App Service (optional)
        if: env.AZURE_WEBAPP_NAME != ''
        run: |
          az webapp config appsettings set \
            --name "$AZURE_WEBAPP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --settings \
              AzureStorage__TableServiceUri="${{ steps.extract_outputs.outputs.storageTableEndpoint }}" \
              AzureStorage__RecipesTableName="${{ steps.extract_outputs.outputs.recipesTableName }}" \
              AzureStorage__MealPlanTableName="${{ steps.extract_outputs.outputs.mealPlanTableName }}" \
              AzureStorage__CookProgressTableName="${{ steps.extract_outputs.outputs.cookProgressTableName }}"

      - name: Apply runtime settings to Function App (optional)
        if: env.AZURE_FUNCTIONAPP_NAME != ''
        run: |
          az functionapp config appsettings set \
            --name "$AZURE_FUNCTIONAPP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --settings \
              AzureStorage__TableServiceUri="${{ steps.extract_outputs.outputs.storageTableEndpoint }}" \
              AzureStorage__RecipesTableName="${{ steps.extract_outputs.outputs.recipesTableName }}" \
              AzureStorage__MealPlanTableName="${{ steps.extract_outputs.outputs.mealPlanTableName }}" \
              AzureStorage__CookProgressTableName="${{ steps.extract_outputs.outputs.cookProgressTableName }}"

      - name: Runtime settings target not configured
        if: env.AZURE_WEBAPP_NAME == '' && env.AZURE_FUNCTIONAPP_NAME == ''
        run: |
          echo "No AZURE_WEBAPP_NAME or AZURE_FUNCTIONAPP_NAME variable configured. Skipping runtime app settings update."

      - name: Upload deployment result artifact
        uses: actions/upload-artifact@v4
        with:
          name: infra-production-deployment-result
          path: deployment-result.json

      - name: Deployment summary
        run: |
          {
            echo "### Production Infra Deployment Outputs"
            echo "- storageAccountName: ${{ steps.extract_outputs.outputs.storageAccountName }}"
            echo "- storageTableEndpoint: ${{ steps.extract_outputs.outputs.storageTableEndpoint }}"
            echo "- recipesTableName: ${{ steps.extract_outputs.outputs.recipesTableName }}"
            echo "- mealPlanTableName: ${{ steps.extract_outputs.outputs.mealPlanTableName }}"
            echo "- cookProgressTableName: ${{ steps.extract_outputs.outputs.cookProgressTableName }}"
